name: CI

on:
  push:
    branches: [main, develop, "feature/**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore NeuroAdminApp.sln

      - name: Build solution
        run: dotnet build NeuroAdminApp.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test NeuroAdminApp.sln --no-build --configuration Release --verbosity normal
